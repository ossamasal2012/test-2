<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSSAMA TV - Premium Entertainment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8a2e;
            --bg-dark: #0a0a0a;
            --accent-red: #e63946;
            --accent-green: #2a9d8f;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b38728 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-bg {
            background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b38728 100%);
        }

        .gold-border {
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.15);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .player-shadow {
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
        }

        /* Loading Animation */
        .loader {
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glass-effect {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Player Controls Animation */
        .controls-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
            transition: opacity 0.4s ease;
        }

        .player-btn {
            transition: all 0.2s ease;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
        }

        .player-btn:hover {
            transform: scale(1.1);
            color: var(--gold);
        }

        input[type=range] {
            accent-color: var(--gold);
        }
    </style>
</head>
<body class="custom-scrollbar">

    <!-- Header Section -->
    <header class="sticky top-0 z-50 glass-effect border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 gold-bg rounded-lg flex items-center justify-center shadow-lg transform rotate-3">
                <span class="text-black font-black text-xl">O</span>
            </div>
            <h1 class="text-2xl font-black gold-gradient tracking-widest">OSSAMA TV</h1>
        </div>
        
        <nav class="flex gap-8 items-center text-sm font-bold">
            <button onclick="showSection('home')" class="hover:text-yellow-500 transition-all border-b-2 border-transparent hover:border-yellow-500 pb-1">الرئيسية</button>
            <button onclick="showSection('favorites')" class="hover:text-red-500 transition-all border-b-2 border-transparent hover:border-red-500 pb-1 flex items-center gap-2">
                <span>المفضلة</span>
                <span id="fav-count" class="bg-red-600 text-[10px] px-1.5 py-0.5 rounded-full shadow-lg">0</span>
            </button>
        </nav>
    </header>

    <!-- Professional Internal Player -->
    <div id="player-container" class="hidden fixed inset-0 z-[100] bg-black flex items-center justify-center overflow-hidden">
        
        <!-- Player Context -->
        <div class="relative w-full h-full flex flex-col group overflow-hidden" id="video-wrapper">
            
            <!-- Video Element -->
            <video id="video-player" class="w-full h-full object-contain cursor-pointer" playsinline></video>

            <!-- Loading Spinner -->
            <div id="video-loader" class="absolute inset-0 flex items-center justify-center bg-black/50 z-20 hidden">
                <div class="flex flex-col items-center gap-4">
                    <div class="loader"></div>
                    <p class="text-yellow-500 font-bold tracking-widest animate-pulse">جاري التحميل...</p>
                </div>
            </div>

            <!-- Top Header (Inside Player) -->
            <div class="absolute top-0 left-0 right-0 p-8 flex justify-between items-start z-30 opacity-0 group-hover:opacity-100 transition-opacity duration-500 bg-gradient-to-b from-black/80 to-transparent">
                <div class="flex items-center gap-4">
                    <button onclick="closePlayer()" class="bg-white/10 hover:bg-red-600 p-3 rounded-full transition-all border border-white/10">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </button>
                    <div>
                        <h2 id="current-channel-name" class="text-2xl font-black gold-gradient">Channel Name</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="w-2 h-2 bg-red-600 rounded-full animate-ping"></span>
                            <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">بث مباشر فائق الجودة</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <img id="player-channel-logo" src="" class="h-12 w-auto object-contain filter drop-shadow-lg opacity-80" />
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="absolute bottom-0 left-0 right-0 p-8 z-30 opacity-0 group-hover:opacity-100 transition-opacity duration-500 controls-overlay">
                
                <!-- Progress Bar (Fake for live, real for mp4) -->
                <div class="w-full h-1.5 bg-white/20 rounded-full mb-6 cursor-pointer relative overflow-hidden">
                    <div id="progress-bar" class="absolute top-0 left-0 h-full gold-bg w-0 transition-all"></div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-8">
                        <!-- Play/Pause -->
                        <button onclick="togglePlay()" class="player-btn">
                            <svg id="play-icon" class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="pause-icon" class="w-10 h-10 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>

                        <!-- Volume -->
                        <div class="flex items-center gap-3 group/vol">
                            <button onclick="toggleMute()" class="player-btn">
                                <svg id="vol-icon" class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                            </button>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-20 h-1 bg-white/20 rounded-lg appearance-none cursor-pointer">
                        </div>

                        <!-- Live Indicator -->
                        <div class="text-sm font-bold flex items-center gap-2 bg-red-600/20 px-3 py-1 rounded border border-red-600/30">
                            <span class="text-red-500">●</span>
                            <span class="tracking-widest">LIVE</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-6">
                        <button onclick="toggleFullScreen()" class="player-btn">
                            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6 space-y-12">
        
        <!-- Welcome Hero -->
        <section id="hero-section" class="relative rounded-[2.5rem] overflow-hidden h-[350px] flex items-center p-12 bg-cover bg-center border border-white/5 shadow-2xl" style="background-image: linear-gradient(to left, rgba(0,0,0,0.95), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1593784991095-a205069470b6?auto=format&fit=crop&q=80&w=2000');">
            <div class="relative z-10 max-w-xl">
                <span class="gold-bg text-black text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-[0.2em] shadow-lg">Premium Experience</span>
                <h2 class="text-6xl font-black mt-6 leading-tight">عالم من <span class="gold-gradient">الترفيه</span> <br>بين يديك</h2>
                <p class="text-gray-400 mt-6 text-lg leading-relaxed">استمتع بمشاهدة قنواتك المفضلة بجودة 4K مع مشغل OSSAMA TV الأكثر تطوراً في الوطن العربي.</p>
                <div class="mt-8 flex gap-4">
                    <button onclick="window.scrollTo({top: 800, behavior: 'smooth'})" class="gold-bg text-black font-bold px-8 py-3 rounded-full hover:scale-105 transition shadow-[0_0_20px_rgba(212,175,55,0.4)]">تصفح القنوات الآن</button>
                </div>
            </div>
        </section>

        <!-- Categories & Channels Wrapper -->
        <div id="main-content-wrapper">
            <!-- Content Injected via JS -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-24 border-t border-white/5 py-16 text-center">
        <div class="flex justify-center items-center gap-3 mb-6 opacity-50">
            <div class="w-8 h-8 gold-bg rounded flex items-center justify-center"><span class="text-black font-bold">O</span></div>
            <span class="text-xl font-black tracking-widest gold-gradient">OSSAMA TV</span>
        </div>
        <p class="text-gray-500 text-sm">تم التصميم باحترافية لتجربة مشاهدة لا تُنسى &copy; 2024</p>
    </footer>

    <script>
        const categories = [
            {
                title: "باقة لبنان",
                icon: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Flag_of_Lebanon.svg/2560px-Flag_of_Lebanon.svg.png",
                channels: [
                    { name: "MTV Lebanon", url: "https://hms.pfs.gdn/v1/broadcast/mtv/playlist.m3u8", logo: "https://www.mtv.com.lb/images/header/mtv-logo.svg" },
                    { name: "المنار", url: "https://edge.fastpublish.me/live/tracks-v1a1/mono.m3u8", logo: "https://almanar.com.lb/framework/assets/images/manar-logo.png" }
                ]
            },
            {
                title: "باقة النيل و المنوعات",
                icon: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Flag_of_Egypt.svg/2560px-Flag_of_Egypt.svg.png",
                channels: [
                    { name: "قناة النيل للأخبار", url: "https://nile-news.shofha.com/index.m3u8", logo: "https://upload.wikimedia.org/wikipedia/ar/3/3a/Nile_News_Logo.png" },
                    { name: "تحدي الفيديو", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", logo: "https://cdn-icons-png.flaticon.com/512/1179/1179120.png" }
                ]
            }
        ];

        let favorites = JSON.parse(localStorage.getItem('ossama_favs')) || [];
        const video = document.getElementById('video-player');
        const hls = new Hls({
            maxBufferSize: 30 * 1000 * 1000, // 30MB
            startLevel: -1 // Auto quality
        });

        // --- Core Functions ---
        function initApp() {
            renderContent('home');
            updateFavCount();
            setupPlayerControls();
        }

        function setupPlayerControls() {
            // Volume control
            const volSlider = document.getElementById('volume-slider');
            volSlider.addEventListener('input', (e) => {
                video.volume = e.target.value;
                video.muted = e.target.value == 0;
            });

            // Update progress bar
            video.addEventListener('timeupdate', () => {
                const progress = (video.currentTime / video.duration) * 100;
                document.getElementById('progress-bar').style.width = (progress || 0) + '%';
            });

            // Double click for fullscreen
            video.addEventListener('dblclick', toggleFullScreen);
            
            // Single click to play/pause
            video.addEventListener('click', togglePlay);
        }

        function renderContent(section) {
            const wrapper = document.getElementById('main-content-wrapper');
            wrapper.innerHTML = '';

            if (section === 'favorites') {
                renderFavorites(wrapper);
            } else {
                categories.forEach(cat => {
                    const sectionEl = document.createElement('section');
                    sectionEl.className = "mb-16";
                    sectionEl.innerHTML = `
                        <div class="flex items-center gap-5 mb-8">
                            <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center shadow-lg">
                                <img src="${cat.icon}" class="w-8 h-8 object-contain rounded" />
                            </div>
                            <h3 class="text-3xl font-black text-white">${cat.title}</h3>
                            <div class="flex-1 h-[1px] bg-gradient-to-r from-yellow-500/30 to-transparent"></div>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8">
                            ${cat.channels.map(ch => renderChannelCard(ch)).join('')}
                        </div>
                    `;
                    wrapper.appendChild(sectionEl);
                });
            }
        }

        function renderChannelCard(ch) {
            const isFav = favorites.some(f => f.url === ch.url);
            const isVideo = /\.(m3u8|mp4|m4u|ts|js)/i.test(ch.url);

            return `
                <div class="group relative bg-[#111] gold-border rounded-[2rem] p-5 card-hover transition-all duration-500 cursor-pointer overflow-hidden shadow-2xl" 
                     onclick="handleChannelClick('${ch.name}', '${ch.url}', '${ch.logo}', ${isVideo})">
                    
                    <div class="absolute top-4 left-4 z-10">
                        <button onclick="toggleFav(event, '${ch.name}', '${ch.url}', '${ch.logo}')" class="p-2.5 rounded-full glass-effect hover:bg-red-600/20 transition-all border border-white/5">
                            <svg class="w-4 h-4 ${isFav ? 'fill-red-500 text-red-500' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="h-28 flex items-center justify-center mb-6 bg-black/40 rounded-[1.5rem] p-4 group-hover:scale-110 transition-transform duration-500">
                        <img src="${ch.logo}" alt="${ch.name}" class="max-h-full max-w-full object-contain filter drop-shadow-[0_0_10px_rgba(255,255,255,0.1)]" onerror="this.src='https://via.placeholder.com/150/000/d4af37?text=TV'">
                    </div>
                    
                    <div class="text-center">
                        <h4 class="font-black text-sm truncate text-white group-hover:text-yellow-500 transition-colors">${ch.name}</h4>
                        <div class="flex justify-center gap-1 mt-2 opacity-50 group-hover:opacity-100">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                            <span class="text-[9px] font-bold uppercase tracking-widest">Active Live</span>
                        </div>
                    </div>

                    <div class="absolute inset-0 bg-gradient-to-t from-yellow-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </div>
            `;
        }

        function handleChannelClick(name, url, logo, isVideo) {
            if (isVideo) {
                openPlayer(name, url, logo);
            } else {
                window.open(url, '_blank');
            }
        }

        // --- Player Logic ---
        function openPlayer(name, url, logo) {
            const container = document.getElementById('player-container');
            const loader = document.getElementById('video-loader');
            const titleEl = document.getElementById('current-channel-name');
            const logoEl = document.getElementById('player-channel-logo');
            
            container.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            titleEl.innerText = name;
            logoEl.src = logo;
            loader.classList.remove('hidden');

            if (Hls.isSupported() && url.includes('.m3u8')) {
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    updatePlayState(true);
                    loader.classList.add('hidden');
                });
            } else {
                video.src = url;
                video.load();
                video.play().then(() => {
                    updatePlayState(true);
                    loader.classList.add('hidden');
                }).catch(() => {
                    loader.classList.add('hidden');
                });
            }
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                updatePlayState(true);
            } else {
                video.pause();
                updatePlayState(false);
            }
        }

        function updatePlayState(isPlaying) {
            document.getElementById('play-icon').classList.toggle('hidden', isPlaying);
            document.getElementById('pause-icon').classList.toggle('hidden', !isPlaying);
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('volume-slider').value = video.muted ? 0 : video.volume;
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.getElementById('video-wrapper').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function closePlayer() {
            document.getElementById('player-container').classList.add('hidden');
            document.body.style.overflow = 'auto';
            video.pause();
            video.src = "";
            if (hls) hls.detachMedia();
            if (document.fullscreenElement) document.exitFullscreen();
        }

        // --- Shared Logic ---
        function toggleFav(event, name, url, logo) {
            event.stopPropagation();
            const index = favorites.findIndex(f => f.url === url);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push({ name, url, logo });
            }
            localStorage.setItem('ossama_favs', JSON.stringify(favorites));
            updateFavCount();
            renderContent(currentSection);
        }

        let currentSection = 'home';
        function showSection(section) {
            currentSection = section;
            renderContent(section);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updateFavCount() {
            document.getElementById('fav-count').innerText = favorites.length;
        }

        function renderFavorites(wrapper) {
            wrapper.innerHTML = `
                <div class="flex items-center gap-5 mb-10">
                    <h3 class="text-4xl font-black text-red-500 uppercase tracking-tighter">قائمة المفضلة</h3>
                    <div class="flex-1 h-[1px] bg-red-600/20"></div>
                </div>
            `;
            if (favorites.length === 0) {
                wrapper.innerHTML += `<div class="p-32 text-center text-gray-500 bg-[#111] rounded-[3rem] border border-dashed border-white/5">لا توجد قنوات في المفضلة بعد. قم بإضافة قنواتك المفضلة للوصول السريع إليها.</div>`;
                return;
            }
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8";
            grid.innerHTML = favorites.map(ch => renderChannelCard(ch)).join('');
            wrapper.appendChild(grid);
        }

        window.onload = initApp;

        // Error Handling
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch (data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                    case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                    default: closePlayer(); break;
                }
            }
        });

    </script>
</body>
</html>
