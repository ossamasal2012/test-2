<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل OSSAMA الاحترافي</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <style>
        /* تصميم عصري باللون الأسود التام */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* تنسيق المشغل */
        .video-js {
            width: 100% !important;
            height: 450px !important;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.2);
        }

        .status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #007bff;">مشغل الروابط المباشرة</h2>
        
        <div class="input-section">
            <input type="text" id="m3u8-url" placeholder="أدخل رابط m3u8 هنا...">
            <button onclick="loadStream()">تشغيل الآن</button>
            <p class="status" id="status-text">جاهز لاستقبال الرابط...</p>
        </div>

        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">
                للمشاهدة، يرجى تفعيل الجافا سكريبت في المتصفح.
            </p>
        </video>
    </div>

    <script>
        // إعداد المشغل
        var player = videojs('my-video', {
            fluid: true,
            html5: {
                vhs: { overrideNative: true },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        function loadStream() {
            var url = document.getElementById('m3u8-url').value;
            var statusText = document.getElementById('status-text');

            if (url.trim() === "") {
                alert("يرجى إدخال رابط أولاً!");
                return;
            }

            // محاولة تشغيل الرابط
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });

            player.play().then(() => {
                statusText.innerText = "البث يعمل بنجاح ✅";
                statusText.style.color = "#28a745";
            }).catch(error => {
                statusText.innerText = "فشل التشغيل: تأكد من صحة الرابط أو سياسة CORS ❌";
                statusText.style.color = "#dc3545";
            });
        }

        // معالجة الأخطاء التلقائية لضمان استمرار العمل
        player.on('error', function() {
            console.log("حدث خطأ في المصدر، محاولة إعادة الاتصال...");
            player.pause();
            player.load();
        });
    </script>
</body>
</html>
